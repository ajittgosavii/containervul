<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="reportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1050" fill="#f8f9ff" rx="12"/>

  <!-- Header -->
  <rect x="30" y="20" width="1340" height="70" rx="12" fill="url(#headerGrad)"/>
  <text x="700" y="62" text-anchor="middle" fill="white" font-size="26" font-weight="bold">Enterprise Container Vulnerability Management — End User Flow</text>

  <!-- ====== ROW 1: Entry Points ====== -->
  <text x="60" y="130" fill="#1a1a2e" font-size="16" font-weight="bold" opacity="0.6">STEP 1 — USER ENTRY</text>

  <!-- User -->
  <rect x="80" y="150" width="180" height="90" rx="45" fill="url(#userGrad)" filter="url(#shadow)"/>
  <text x="170" y="190" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DevSecOps Engineer</text>
  <text x="170" y="210" text-anchor="middle" fill="white" font-size="11" opacity="0.9">Opens Streamlit App</text>

  <!-- Login/Dashboard -->
  <rect x="340" y="150" width="200" height="90" rx="10" fill="white" stroke="#533483" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="185" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">Dashboard</text>
  <text x="440" y="205" text-anchor="middle" fill="#666" font-size="11">View risk posture,</text>
  <text x="440" y="220" text-anchor="middle" fill="#666" font-size="11">severity metrics, trends</text>

  <!-- Configure Accounts -->
  <rect x="620" y="150" width="200" height="90" rx="10" fill="white" stroke="#533483" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="185" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">Configure Accounts</text>
  <text x="720" y="205" text-anchor="middle" fill="#666" font-size="11">Add AWS / Azure / GCP</text>
  <text x="720" y="220" text-anchor="middle" fill="#666" font-size="11">accounts &amp; credentials</text>

  <!-- Configure ServiceNow -->
  <rect x="900" y="150" width="200" height="90" rx="10" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="185" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">Configure ServiceNow</text>
  <text x="1000" y="205" text-anchor="middle" fill="#666" font-size="11">Instance URL, credentials,</text>
  <text x="1000" y="220" text-anchor="middle" fill="#666" font-size="11">auto-ticket thresholds</text>

  <!-- Arrows Row 1 -->
  <line x1="260" y1="195" x2="335" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="195" x2="615" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="195" x2="895" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 2: Scanning ====== -->
  <text x="60" y="295" fill="#1a1a2e" font-size="16" font-weight="bold" opacity="0.6">STEP 2 — VULNERABILITY SCANNING</text>

  <rect x="80" y="315" width="250" height="100" rx="10" fill="white" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="315" width="250" height="28" rx="10" fill="url(#scanGrad)"/>
  <text x="205" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Dockerfile Scan</text>
  <text x="205" y="365" text-anchor="middle" fill="#333" font-size="11">Paste or upload Dockerfile</text>
  <text x="205" y="382" text-anchor="middle" fill="#333" font-size="11">→ Regex pattern analysis</text>
  <text x="205" y="399" text-anchor="middle" fill="#333" font-size="11">→ Secrets, misconfig, outdated</text>

  <rect x="380" y="315" width="250" height="100" rx="10" fill="white" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="380" y="315" width="250" height="28" rx="10" fill="url(#scanGrad)"/>
  <text x="505" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Cloud Container Scan</text>
  <text x="505" y="365" text-anchor="middle" fill="#333" font-size="11">Select provider &amp; service</text>
  <text x="505" y="382" text-anchor="middle" fill="#333" font-size="11">→ EKS/ECS/AKS/ACI/GKE/Run</text>
  <text x="505" y="399" text-anchor="middle" fill="#333" font-size="11">→ Discover images &amp; vulns</text>

  <rect x="680" y="315" width="250" height="100" rx="10" fill="white" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="680" y="315" width="250" height="28" rx="10" fill="url(#scanGrad)"/>
  <text x="805" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">CVE Lookup</text>
  <text x="805" y="365" text-anchor="middle" fill="#333" font-size="11">Search by CVE ID or product</text>
  <text x="805" y="382" text-anchor="middle" fill="#333" font-size="11">→ NIST NVD API integration</text>
  <text x="805" y="399" text-anchor="middle" fill="#333" font-size="11">→ CVSS scores &amp; references</text>

  <rect x="980" y="315" width="250" height="100" rx="10" fill="white" stroke="#4facfe" stroke-width="2" filter="url(#shadow)"/>
  <rect x="980" y="315" width="250" height="28" rx="10" fill="url(#aiGrad)"/>
  <text x="1105" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">AI Agent Chat</text>
  <text x="1105" y="365" text-anchor="middle" fill="#333" font-size="11">Natural language commands</text>
  <text x="1105" y="382" text-anchor="middle" fill="#333" font-size="11">→ "Audit my EKS clusters"</text>
  <text x="1105" y="399" text-anchor="middle" fill="#333" font-size="11">→ Autonomous tool-use loop</text>

  <!-- ====== ROW 3: Analysis & Remediation ====== -->
  <text x="60" y="470" fill="#1a1a2e" font-size="16" font-weight="bold" opacity="0.6">STEP 3 — ANALYSIS &amp; REMEDIATION</text>

  <rect x="80" y="490" width="300" height="110" rx="10" fill="white" stroke="#764ba2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="490" width="300" height="28" rx="10" fill="url(#userGrad)"/>
  <text x="230" y="510" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Risk Assessment</text>
  <text x="230" y="540" text-anchor="middle" fill="#333" font-size="11">• Severity breakdown (CRITICAL → LOW)</text>
  <text x="230" y="557" text-anchor="middle" fill="#333" font-size="11">• Risk score calculation with weighting</text>
  <text x="230" y="574" text-anchor="middle" fill="#333" font-size="11">• Priority ranking of vulnerabilities</text>
  <text x="230" y="591" text-anchor="middle" fill="#333" font-size="11">• Interactive charts (Plotly)</text>

  <rect x="430" y="490" width="300" height="110" rx="10" fill="white" stroke="#4facfe" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="490" width="300" height="28" rx="10" fill="url(#aiGrad)"/>
  <text x="580" y="510" text-anchor="middle" fill="white" font-size="12" font-weight="bold">AI Remediation</text>
  <text x="580" y="540" text-anchor="middle" fill="#333" font-size="11">• Claude AI generates remediation plan</text>
  <text x="580" y="557" text-anchor="middle" fill="#333" font-size="11">• Immediate / short-term / long-term actions</text>
  <text x="580" y="574" text-anchor="middle" fill="#333" font-size="11">• Automated fix scripts (bash)</text>
  <text x="580" y="591" text-anchor="middle" fill="#333" font-size="11">• Knowledge base + AI hybrid</text>

  <rect x="780" y="490" width="300" height="110" rx="10" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="780" y="490" width="300" height="28" rx="10" fill="url(#snowGrad)"/>
  <text x="930" y="510" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Compliance Check</text>
  <text x="930" y="540" text-anchor="middle" fill="#333" font-size="11">• CIS Docker Benchmark (9 controls)</text>
  <text x="930" y="557" text-anchor="middle" fill="#333" font-size="11">• CIS Kubernetes Benchmark (8 controls)</text>
  <text x="930" y="574" text-anchor="middle" fill="#333" font-size="11">• NIST SP 800-190 (8 controls)</text>
  <text x="930" y="591" text-anchor="middle" fill="#333" font-size="11">• Compliance score gauge + gap analysis</text>

  <!-- Down arrows from Row 2 to Row 3 -->
  <line x1="205" y1="415" x2="205" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="505" y1="415" x2="505" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="805" y1="415" x2="930" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>
  <line x1="1105" y1="415" x2="580" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>

  <!-- ====== ROW 4: ServiceNow & Reporting ====== -->
  <text x="60" y="655" fill="#1a1a2e" font-size="16" font-weight="bold" opacity="0.6">STEP 4 — TICKETING &amp; REPORTING</text>

  <rect x="80" y="675" width="280" height="110" rx="10" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="675" width="280" height="28" rx="10" fill="url(#snowGrad)"/>
  <text x="220" y="695" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ServiceNow Incidents</text>
  <text x="220" y="725" text-anchor="middle" fill="#333" font-size="11">• Auto-create P1/P2 for CRITICAL/HIGH</text>
  <text x="220" y="742" text-anchor="middle" fill="#333" font-size="11">• Bulk ticket creation with dedup</text>
  <text x="220" y="759" text-anchor="middle" fill="#333" font-size="11">• Bidirectional status sync</text>
  <text x="220" y="776" text-anchor="middle" fill="#333" font-size="11">• Change requests for remediation</text>

  <rect x="410" y="675" width="280" height="110" rx="10" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="675" width="280" height="28" rx="10" fill="url(#snowGrad)"/>
  <text x="550" y="695" text-anchor="middle" fill="white" font-size="12" font-weight="bold">CMDB Sync</text>
  <text x="550" y="725" text-anchor="middle" fill="#333" font-size="11">• Container images → CI records</text>
  <text x="550" y="742" text-anchor="middle" fill="#333" font-size="11">• K8s clusters → CI records</text>
  <text x="550" y="759" text-anchor="middle" fill="#333" font-size="11">• Services with relationships</text>
  <text x="550" y="776" text-anchor="middle" fill="#333" font-size="11">• Operational status tracking</text>

  <rect x="740" y="675" width="280" height="110" rx="10" fill="white" stroke="#fa709a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="740" y="675" width="280" height="28" rx="10" fill="url(#reportGrad)"/>
  <text x="880" y="695" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Reports &amp; Analytics</text>
  <text x="880" y="725" text-anchor="middle" fill="#333" font-size="11">• Executive summary report</text>
  <text x="880" y="742" text-anchor="middle" fill="#333" font-size="11">• Technical vulnerability report</text>
  <text x="880" y="759" text-anchor="middle" fill="#333" font-size="11">• Compliance summary report</text>
  <text x="880" y="776" text-anchor="middle" fill="#333" font-size="11">• Export: Markdown, JSON, CSV</text>

  <rect x="1070" y="675" width="280" height="110" rx="10" fill="white" stroke="#764ba2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1070" y="675" width="280" height="28" rx="10" fill="url(#userGrad)"/>
  <text x="1210" y="695" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Audit Trail</text>
  <text x="1210" y="725" text-anchor="middle" fill="#333" font-size="11">• All actions logged with timestamp</text>
  <text x="1210" y="742" text-anchor="middle" fill="#333" font-size="11">• User, action, target, result</text>
  <text x="1210" y="759" text-anchor="middle" fill="#333" font-size="11">• Filterable and exportable</text>
  <text x="1210" y="776" text-anchor="middle" fill="#333" font-size="11">• RBAC: Viewer→Admin roles</text>

  <!-- Down arrows Row 3 to Row 4 -->
  <line x1="230" y1="600" x2="220" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="600" x2="550" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="930" y1="600" x2="880" y2="670" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 5: Outcome ====== -->
  <text x="60" y="840" fill="#1a1a2e" font-size="16" font-weight="bold" opacity="0.6">OUTCOME</text>

  <rect x="250" y="860" width="900" height="80" rx="15" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="700" y="895" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Reduced Container Risk • Compliance Achieved • Automated Remediation</text>
  <text x="700" y="920" text-anchor="middle" fill="white" font-size="13" opacity="0.9">Vulnerabilities tracked → Tickets created → Patches applied → Compliance verified → Reports delivered</text>

  <!-- Arrows to outcome -->
  <line x1="220" y1="785" x2="500" y2="855" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="785" x2="600" y2="855" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="785" x2="800" y2="855" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1210" y1="785" x2="900" y2="855" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <rect x="30" y="965" width="1340" height="65" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="60" y="990" fill="#333" font-size="12" font-weight="bold">Legend:</text>
  <rect x="120" y="978" width="16" height="16" rx="3" fill="url(#scanGrad)"/><text x="142" y="991" fill="#555" font-size="11">Scanning</text>
  <rect x="220" y="978" width="16" height="16" rx="3" fill="url(#aiGrad)"/><text x="242" y="991" fill="#555" font-size="11">AI/Agent</text>
  <rect x="310" y="978" width="16" height="16" rx="3" fill="url(#snowGrad)"/><text x="332" y="991" fill="#555" font-size="11">ServiceNow</text>
  <rect x="430" y="978" width="16" height="16" rx="3" fill="url(#reportGrad)"/><text x="452" y="991" fill="#555" font-size="11">Reporting</text>
  <rect x="540" y="978" width="16" height="16" rx="3" fill="url(#userGrad)"/><text x="562" y="991" fill="#555" font-size="11">User/Management</text>
  <line x1="680" y1="988" x2="720" y2="988" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/><text x="730" y="992" fill="#555" font-size="11">Direct flow</text>
  <line x1="830" y1="988" x2="870" y2="988" stroke="#555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/><text x="880" y="992" fill="#555" font-size="11">Cross-flow</text>
</svg>
